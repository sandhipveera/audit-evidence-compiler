# Audit Evidence Compiler — index definitions
#
# auditcompiler_posture  — stores latest verdict per control, updated every 4h
#                          by scheduled saved searches (see savedsearches.conf).
#                          Retention: 90 days (compliance review window).

[auditcompiler_posture]
homePath   = $SPLUNK_DB/auditcompiler_posture/db
coldPath   = $SPLUNK_DB/auditcompiler_posture/colddb
thawedPath = $SPLUNK_DB/auditcompiler_posture/thaweddb
frozenTimePeriodInSecs = 7776000
