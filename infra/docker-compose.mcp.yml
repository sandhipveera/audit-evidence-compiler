version: "3.8"

services:
  splunk:
    image: splunk/splunk:latest
    container_name: aec-splunk
    ports:
      - "8001:8000"
      - "8088:8088"
      - "8089:8089"
    environment:
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_PASSWORD: "${SPLUNK_PASSWORD:-changeme123}"
    volumes:
      - splunk-data:/opt/splunk/var
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/splunk/bin/splunk", "status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  mcp-official:
    image: ghcr.io/splunk/mcp-server-for-splunk:latest
    container_name: aec-mcp-official
    build:
      context: .
      dockerfile: Dockerfile.mcp-official
    ports:
      - "8765:8765"
    environment:
      SPLUNK_HOST: "https://splunk:8089"
      SPLUNK_TOKEN: "${SPLUNK_TOKEN}"
      SPLUNK_VERIFY_SSL: "false"
    depends_on:
      splunk:
        condition: service_healthy
    restart: unless-stopped

  mcp-livehybrid:
    image: ghcr.io/livehybrid/splunk-mcp:latest
    container_name: aec-mcp-livehybrid
    build:
      context: .
      dockerfile: Dockerfile.mcp-livehybrid
    ports:
      - "8766:8766"
    environment:
      SPLUNK_HOST: "https://splunk:8089"
      SPLUNK_TOKEN: "${SPLUNK_TOKEN}"
      SPLUNK_VERIFY_SSL: "false"
    depends_on:
      splunk:
        condition: service_healthy
    restart: unless-stopped

volumes:
  splunk-data:
